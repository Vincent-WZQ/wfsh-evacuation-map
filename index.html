<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萬芳高中 — 3D 互動疏散路線圖（地震災害）</title>
<style>
  :root{
    /* 淺色科技風的高質感色系 */
    --ink:#0f172a;
    --paper:#f8fafc;
    --line:#e2e8f0;
    --west:#ef4444;       /* 科技紅 */
    --east:#3b82f6;       /* 科技藍 */
    --single:#f59e0b;     /* 亮橙色 */
    --south-special:#8b5cf6; /* 亮紫色 */
    --north-stair:#10b981; /* 科技綠 */
    --safe:#38bdf8;
    --panel:rgba(255, 255, 255, 0.75);
  }
  *{box-sizing:border-box;}
  
  /* 現代化字體堆疊與乾淨的背景設定 */
  html,body{margin:0;height:100%;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans TC", sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;}
  #app{position:fixed;inset:0;touch-action:none;}
  canvas{display:block;}
  
  /* ───── 收合式面板樣式設計 (極簡毛玻璃) ───── */
  #panel{position:absolute;top:20px;left:20px;width:320px;max-width:calc(100vw - 40px);max-height:calc(100vh - 40px);
    background:var(--panel);border:1px solid rgba(255,255,255,0.9);border-radius:20px;box-shadow:0 16px 40px rgba(15,23,42,0.06);backdrop-filter:blur(24px);z-index:10; display: flex; flex-direction: column;}
  
  .panel-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(226,232,240,0.6); transition: background 0.2s; border-radius: 20px 20px 0 0; }
  .panel-header:hover { background: rgba(255,255,255,0.5); }
  .panel-header .titles { display: flex; flex-direction: column; }
  .panel-header h1 { font-size: 17px; font-weight: 700; margin: 0 0 4px; letter-spacing: 0.02em; }
  .panel-header .sub { font-size: 11px; color: #64748b; margin: 0; font-weight: 500;}
  #toggleBtn { background: #fff; border: 1px solid var(--line); color: #475569; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; border-radius: 10px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(15,23,42,0.02);}
  #toggleBtn:hover { background: #f1f5f9; color: #0f172a; border-color: #cbd5e1;}

  #panelContent { padding: 20px; overflow-y: auto; }
  #panel.collapsed #panelContent { display: none; }
  #panel.collapsed .panel-header { border-bottom: none; border-radius: 20px; }

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:0.06em;text-transform:uppercase;}
  select{width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font-family:inherit;font-weight:500;outline:none;transition:border 0.2s;}
  select:focus{border-color:#94a3b8; box-shadow: 0 0 0 3px rgba(226,232,240,0.5);}
  .floors{display:flex;gap:8px;flex-wrap:wrap;}
  .floors button{flex:1;min-width:44px;padding:12px 0;font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:12px;cursor:pointer;color:#64748b;font-family:inherit;transition:all 0.15s ease;}
  .floors button.active{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 4px 12px rgba(15,23,42,0.15);}
  .floors button:hover:not(.active){background:#f8fafc;color:#0f172a;border-color:#cbd5e1;}
  
  #routeBtn{width:100%;margin-top:4px;padding:14px;border:none;border-radius:12px;background:#0f172a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em;font-family:inherit;transition:all 0.2s;box-shadow:0 6px 16px rgba(15,23,42,0.15);}
  #routeBtn:hover{background:#1e293b;transform:translateY(-1px);}
  #routeBtn.off{background:#e2e8f0; color:#64748b; box-shadow:none;}
  
  .dest{margin-top:12px;font-size:12px;color:#334155;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px;line-height:1.6;font-weight:500;}
  .legend{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);font-size:11px;color:#475569;line-height:1.9;}

  .principle{margin-top:12px;font-size:11px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 14px;color:#15803d;line-height:1.6;font-weight:600;}
  .note{margin-top:12px;font-size:10px;color:#94a3b8;line-height:1.5;}

/* ───────── 場景與燈光 ───────── */
const app=document.getElementById('app');
const scene=new THREE.Scene();

scene.fog=new THREE.Fog('#f4f7fb', 250, 900);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,3000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

scene.add(new THREE.HemisphereLight('#ffffff','#cbd5e1', 1.05));

sun.position.set(-80,110,30); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-160,right:160,top:160,bottom:-160}); scene.add(sun);

/* ───────── 梯台地形 ───────── */
const ROT = 0.291; 
function L1z(x){ return 58 - 0.30 * x; }
function L2z(x){ return 52 - 0.30 * x; }
const ROAD_PTS = [[-58,23.5],[-36,24.7],[-20,26.2],[-2,28.4],[16,31.2],[30,34.8],[37,37.4]];
function eastRoadY(z){
  if (z <= ROAD_PTS[0][0]) return ROAD_PTS[0][1];
  for (let i = 1; i < ROAD_PTS.length; i++){
    const [z0,y0] = ROAD_PTS[i-1], [z1,y1] = ROAD_PTS[i];
    if (z <= z1) return y0 + (y1 - y0) * (z - z0) / (z1 - z0);
  }
  return 37.4;
}

const WEST_PTS = [[-10, 24.5], [5, 28.0], [18, 33.0], [24, 34.8]];
function westRoadY(z){
  if (z <= WEST_PTS[0][0]) return WEST_PTS[0][1];
  for (let i = 1; i < WEST_PTS.length; i++){
    const [z0,y0] = WEST_PTS[i-1], [z1,y1] = WEST_PTS[i];
    if (z <= z1) return y0 + (y1 - y0) * (z - z0) / (z1 - z0);
  }
  return 34.8;
}

function terrainY(x, z) {
  if (x <= -50) return 22.0;
  if (z <= -58) return 23.0;
  if (x > 52) {
    if (z < -10) return 24.5;
    if (z < 30)  return 36.6;
    return Math.min(36.6 + (z - 30) * 1.1, 60.7);
  }
  const L1 = L1z(x), L2 = L2z(x);
  if (z >= L1) {
    if (z <= 104) return 50.5;
    return 50.5 + (z - 104) * 0.5;
  }
  if (z >= L2) {
    return 44.0 + (z - L2) / (L1 - L2) * 6.5;
  }
  if (x >= 17) {                                    
    if (x >= 25) {
      if (z >= -10) return 36.6;                    
      return 24.5;
    } else {
      if (z >= 38) return 37.4;
      if (z >= 24) return 34.8;
      if (z >= -10) return westRoadY(z);
      return 24.5;
    }
  }
  if (x <= -40) return eastRoadY(z);
  if (z >= 38)  return 37.4;
  if (z >= 16)  return 34.8;
  if (z >= -2)  return 31.0;
  if (z >= -20) return 28.2;
  if (z >= -36) return 26.0;
  return 24.5;
}

const terrainGeo=new THREE.PlaneGeometry(300,300,300,300);
terrainGeo.rotateX(-Math.PI/2);
const tp=terrainGeo.attributes.position;
for(let i=0;i<tp.count;i++){
    const x=tp.getX(i); const z=tp.getZ(i);
    tp.setY(i, terrainY(x,z));
}
terrainGeo.computeVertexNormals();
const terrainMesh=new THREE.Mesh(terrainGeo,new THREE.MeshStandardMaterial({color:'#e2e8f0',roughness:1, flatShading:true}));
terrainMesh.receiveShadow=true; scene.add(terrainMesh);

/* 相機控制參數 */
let target=new THREE.Vector3(0,42,10);
let azim=Math.PI-0.18,polar=0.95,dist=130;
const PMIN=0.22,PMAX=1.32,DMIN=42,DMAX=380;
function updateCam(){
  polar=Math.max(PMIN,Math.min(PMAX,polar)); dist=Math.max(DMIN,Math.min(DMAX,dist));
  const x=target.x+dist*Math.sin(polar)*Math.sin(azim);
  let y=target.y+dist*Math.cos(polar);
  const z=target.z+dist*Math.sin(polar)*Math.cos(azim);
  const minY=terrainY(x,z)+3; if(y<minY)y=minY;
  camera.position.set(x,y,z); camera.lookAt(target);
}

function makeLabel(text,opt={}){
  const fs=opt.fs||34,pad=opt.pad||16;
  const tc=document.createElement('canvas').getContext('2d'); tc.font=`bold ${fs}px "Noto Sans TC",sans-serif`;
  const w=Math.max(tc.measureText(text).width,10);
  const c=document.createElement('canvas'); c.width=w+pad*2; c.height=fs+pad;
  const x=c.getContext('2d');
  
  x.fillStyle=opt.bg||'rgba(255,255,255,.9)'; 
  rr(x,0,0,c.width,c.height,12); x.fill();
  
  if(!opt.bg || opt.bg.includes('255')){ x.strokeStyle='rgba(148,163,184,0.4)'; x.lineWidth=2; x.stroke(); }
  
  x.fillStyle=opt.color||'#0f172a'; x.font=`bold ${fs}px "Noto Sans TC",sans-serif`;
  x.textAlign='center';x.textBaseline='middle'; x.fillText(text,c.width/2,c.height/2);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:opt.depthTest!==false}));
  const sc=opt.scale||0.022; s.scale.set(c.width*sc,c.height*sc,1); return s;
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

/* 使用 zone 來決定箭頭顏色，讓顏色與指向 (dir) 脫鉤 */
function makeArrow(dir, zone){
  const c=document.createElement('canvas'); c.width=96;c.height=64;
  const x=c.getContext('2d');
  const col = zone==='W'?'#ef4444':zone==='E'?'#3b82f6':zone==='N'?'#10b981':'#f59e0b';
  x.fillStyle=col; x.strokeStyle='#fff'; x.lineWidth=3;
  x.beginPath();
  if(dir==='E'){ x.moveTo(8,22);x.lineTo(56,22);x.lineTo(56,12);x.lineTo(88,32);x.lineTo(56,52);x.lineTo(56,42);x.lineTo(8,42); }
  else if(dir==='W'){ x.moveTo(88,22);x.lineTo(40,22);x.lineTo(40,12);x.lineTo(8,32);x.lineTo(40,52);x.lineTo(40,42);x.lineTo(88,42); }
  else if(dir==='N'){ x.moveTo(48,56);x.lineTo(38,56);x.lineTo(38,24);x.lineTo(28,24);x.lineTo(48,4);x.lineTo(68,24);x.lineTo(58,24);x.lineTo(58,56); }
  else { x.moveTo(48,8);x.lineTo(38,8);x.lineTo(38,40);x.lineTo(28,40);x.lineTo(48,60);x.lineTo(68,40);x.lineTo(58,40);x.lineTo(58,8); }
  x.closePath(); x.fill(); x.stroke();
  const t=new THREE.CanvasTexture(c); t.anisotropy=4;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:false}));
  s.scale.set(2.4,1.6,1); return s;
}
function absolutePlane(w,d,color,x,y,z){
  const g=new THREE.PlaneGeometry(w,d); g.rotateX(-Math.PI/2);
  const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color,roughness:1}));
  m.position.set(x,y,z); m.receiveShadow=true; return m;
}

function addCherryBlossomTree(x, z, scale=1) {

function buildMass(key){
  const B=BUILDINGS[key], by=B.baseY, h=B.floors*FLOOR_H;
  const g=new THREE.Group(); g.position.set(B.xPos,by,B.zPos);
  const body=new THREE.Mesh(new THREE.BoxGeometry(B.w,h,B.d),new THREE.MeshStandardMaterial({color:0xf8fafc,roughness:0.2,transparent:true,opacity:0.25}));
  body.position.y=h/2; body.castShadow=false; g.add(body);
  
  // 量體的各層樓板加上半透明，確保能透視內部
  for(let f=1;f<B.floors;f++){
    const ln=new THREE.Mesh(new THREE.BoxGeometry(B.w+0.1,0.1,B.d+0.1),new THREE.MeshStandardMaterial({color:0xcbd5e1, transparent: true, opacity: 0.3}));
    ln.position.y=f*FLOOR_H;
    g.add(ln);
  }
  
  massShafts[key]=[];
  B.stairs.forEach(s=>{
    const sh=new THREE.Mesh(new THREE.BoxGeometry(2.4,h,2.4),new THREE.MeshStandardMaterial({color:0x38bdf8,roughness:.5,transparent:true,opacity:0.85}));
    sh.position.set(s.x,h/2,s.z); g.add(sh);
    const l=makeLabel(s.label||'樓梯',{color:'#fff',bg:'rgba(14,165,233,.85)',fs:24,scale:0.022,depthTest:false}); l.position.set(s.x,h+1,s.z); g.add(l);
    massShafts[key].push({wx:B.xPos+s.x,wz:B.zPos+s.z,topY:by+h});
  });
  const t=makeLabel(B.title,{fs:40,scale:0.045,bg:'rgba(15,23,42,.85)',color:'#fff',depthTest:false}); t.position.set(0,h+3,0); g.add(t);
  ctx3d.add(g);
}

function addCellNS(g,cell,zc,f){

function build(key){
  curKey=key;
  while(buildingGroup.children.length)buildingGroup.remove(buildingGroup.children[0]);
  roomMeshes.length=0; arrowSprites.length=0; floorGroups={};
  const B=BUILDINGS[key]; baseY=B.baseY;
  document.getElementById('floorField').style.display = B.kind==='mass'?'none':'';
  document.getElementById('arrowRow').style.display = B.kind==='mass'?'none':'flex';

  if(B.kind==='mass'){
    geom={}; target.set(B.xPos,baseY+B.floors*FLOOR_H*0.5,B.zPos); azim=Math.PI-0.18;polar=0.92;dist=85; updateCam();
    buildOtherTeach(key); updateDestText(); buildLegend();
    if(routeOn)drawRoute();
    return;
  }
  if(B.kind==='bar'){
    const ncols=B.rows[1].length, bodyLen=ncols*CELL_W;
    const colX=(i)=>bodyLen/2-i*CELL_W-CELL_W/2;
    const stairXs=B.stairCols.map(c=>colX(c));
    geom={bodyLen,colX,stairXs,fMin:B.fMin};
    buildingGroup.position.set(B.xPos,baseY,B.zPos);
    for(let f=B.fMin;f<=B.fMax;f++){
      const g=new THREE.Group(); g.position.y=(f-B.fMin)*FLOOR_H; floorGroups[f]=g; buildingGroup.add(g);
      const slab=new THREE.Mesh(new THREE.BoxGeometry(bodyLen+1,0.25,ROOM_D+1.4),new THREE.MeshStandardMaterial({color:0xf8fafc,roughness:.9}));
      slab.position.set(0,-0.12,0); slab.castShadow=true; slab.receiveShadow=true; slab.userData={isSlab:true}; g.add(slab);
      let i=0;
      while(i<ncols){
        const c=B.rows[f][i]; if(c.type==='skip'){i++;continue;}
        const xc=colX(i)-(c.span-1)*CELL_W/2;
        if(c.type==='stair'){addStair(g,xc,0,'EW');}
        else if(c.name){
          addCellEW(g,c,xc,f);
          const dg=new THREE.PlaneGeometry(ROOM_D*0.86,FLOOR_H*0.8); dg.rotateY(Math.PI/2);
          const dwall=new THREE.Mesh(dg,new THREE.MeshStandardMaterial({color:0x94a3b8,side:THREE.DoubleSide,transparent:true,opacity:.4}));
          dwall.position.set(colX(i)-(c.span-0.525)*CELL_W,FLOOR_H*0.4,0); dwall.userData={isDiv:true}; g.add(dwall);
        }
        i+=c.span||1;
      }
      if(stairXs.length>=2){
        const midX=(stairXs[0]+stairXs[stairXs.length-1])/2;
        const dline=new THREE.Mesh(new THREE.BoxGeometry(0.25,FLOOR_H*0.82,ROOM_D*0.9),new THREE.MeshStandardMaterial({color:0x64748b,transparent:true,opacity:0.25}));
        dline.position.set(midX,FLOOR_H*0.41,0); dline.userData={isDivLine:true}; g.add(dline);
      }
    }
    const titleLbl=makeLabel(B.title,{fs:48,scale:0.05,bg:'rgba(15,23,42,.85)',color:'#fff',depthTest:false});
    titleLbl.position.set(0,(B.fMax-B.fMin+1)*FLOOR_H+3.5,0); buildingGroup.add(titleLbl);
    target.set(B.xPos,baseY+(B.fMax-B.fMin+1)*FLOOR_H*0.5,B.zPos); azim=Math.PI-0.18;polar=0.9;dist=100; updateCam();
  }
  if(B.kind==='L'){
    buildingGroup.position.set(B.xPos,baseY,B.zPos);
    const ewN=7, ewLen=ewN*CELL_W, nsN=6, nsLen=nsN*CELL_W;
    const ewX=i=>ewLen-i*CELL_W-CELL_W/2;
    const nsZ=j=>nsLen-j*CELL_W-CELL_W/2;
    geom={ewLen,nsLen,ewX,nsZ,fMin:B.fMin};
    for(let f=B.fMin;f<=B.fMax;f++){
      const g=new THREE.Group(); g.position.y=(f-B.fMin)*FLOOR_H; floorGroups[f]=g; buildingGroup.add(g);
      const slabE=new THREE.Mesh(new THREE.BoxGeometry(ewLen+1,0.25,ROOM_D+1.4),new THREE.MeshStandardMaterial({color:0xf8fafc,roughness:.9}));
      slabE.position.set(ewLen/2,-0.12,0); slabE.castShadow=true; slabE.receiveShadow=true; slabE.userData={isSlab:true}; g.add(slabE);
      const slabN=new THREE.Mesh(new THREE.BoxGeometry(ROOM_D+1.4,0.25,nsLen+1),new THREE.MeshStandardMaterial({color:0xf8fafc,roughness:.9}));
      slabN.position.set(0,-0.12,nsLen/2); slabN.castShadow=true; slabN.receiveShadow=true; slabN.userData={isSlab:true}; g.add(slabN);
      let i=0; while(i<ewN){const c=B.ew.rows[f][i]; if(c.type==='skip'){i++;continue;} const xc=ewX(i)-(c.span-1)*CELL_W/2; if(c.type==='stair')addStair(g,xc,0,'EW'); else if(c.name)addCellEW(g,c,xc,f); i+=c.span||1;}
      let j=0; while(j<nsN){const c=B.ns.rows[f][j]; if(c.type==='skip'){j++;continue;} const zc=nsZ(j)-(c.span-1)*CELL_W/2; if(c.type==='stair')addStair(g,0,zc,'NS'); else if(c.name)addCellNS(g,c,zc,f); j+=c.span||1;}
    }
    const titleLbl=makeLabel(B.title,{fs:48,scale:0.05,bg:'rgba(15,23,42,.85)',color:'#fff',depthTest:false});
    titleLbl.position.set(10,(B.fMax-B.fMin+1)*FLOOR_H+3.5,14); buildingGroup.add(titleLbl);
    target.set(B.xPos+8,baseY+9,B.zPos+12); azim=Math.PI-0.45;polar=0.95;dist=95; updateCam();
  }
  buildOtherTeach(key); setFloor(B.fMin===0?1:B.fMin); updateDestText(); buildLegend(); applyArrowVis();
}

function buildOtherTeach(activeKey){
  while(otherTeach.children.length)otherTeach.remove(otherTeach.children[0]);
  for(const k of ['heping','xinyi','renai','zhongxiao','kexue']){
    if(k===activeKey)continue;
    const B=BUILDINGS[k]; const by=B.baseY;
    const h=(B.fMax-B.fMin+1)*FLOOR_H;
    const mat=new THREE.MeshStandardMaterial({color:0xf8fafc,roughness:0.2,transparent:true,opacity:0.3});
    if(B.kind==='bar'){
      const bodyLen=B.rows[1].length*CELL_W;
      const ob=new THREE.Mesh(new THREE.BoxGeometry(bodyLen+1,h,ROOM_D+1.4),mat);
      ob.position.set(B.xPos,by+h/2,B.zPos); otherTeach.add(ob);
      const l=makeLabel(B.title,{fs:32,scale:0.034,bg:'rgba(255,255,255,0.4)',color:'#64748b',depthTest:false}); l.position.set(B.xPos,by+h+2,B.zPos); otherTeach.add(l);
    } else {
      const ewLen=7*CELL_W, nsLen=6*CELL_W;
      const e=new THREE.Mesh(new THREE.BoxGeometry(ewLen+1,h,ROOM_D+1.4),mat); e.position.set(B.xPos+ewLen/2,by+h/2,B.zPos); otherTeach.add(e);
      const n=new THREE.Mesh(new THREE.BoxGeometry(ROOM_D+1.4,h,nsLen+1),mat.clone()); n.position.set(B.xPos,by+h/2,B.zPos+nsLen/2); otherTeach.add(n);
      const l=makeLabel(B.title,{fs:32,scale:0.034,bg:'rgba(255,255,255,0.4)',color:'#64748b',depthTest:false}); l.position.set(B.xPos+8,by+h+2,B.zPos+12); otherTeach.add(l);
    }
  }
}

function setFloor(f){
  curFloor=f;
  for(const k in floorGroups){const active=(+k===f),g=floorGroups[k];
    g.traverse(o=>{
      if(o.isMesh&&o.material){const u=o.userData;
        if(u.isSlab){o.material.transparent=true;o.material.opacity=active?1:0.1;}
        else if(u.isStair){o.material.transparent=true;o.material.opacity=active?1:0.1;}
        else if(u.isDiv){o.material.transparent=true;o.material.opacity=active?0.55:0.02;}
        else if(u.isDivLine){o.material.opacity=active?0.4:0;}
        else if(u.baseMat){o.material.opacity=active?(u.isAux?0.8:1.0):0.05;}
      }
      if(o.isSprite&&o.userData.isLabel)o.material.opacity=active?1:0.05;
      if(o.isSprite&&o.userData.isStairLbl)o.material.opacity=active?1:0.05;
    });
  }
  buildFloorButtons(); applyArrowVis(); if(routeOn)drawRoute();
}
let showArrows=true;
function applyArrowVis(){ arrowSprites.forEach(a=>{ a.visible = showArrows && a.userData.floor===curFloor; }); }

/* ───────── 疏散路線產生 ───────── */
let routeOn=true,routeObj=null;
function clearRoute(){if(routeObj){scene.remove(routeObj);routeObj=null;}}
const COLS={ west:{t:0xef4444,e:0x801018,c:0xff8888}, east:{t:0x3b82f6,e:0x1a3b52,c:0x8ecae6}, single:{t:0xf59e0b,e:0x804300,c:0xffb703}, southSp:{t:0x8b5cf6,e:0x360459,c:0xd8b4fe}, northSt:{t:0x10b981,e:0x064e3b,c:0x6ee7b7} };

function gy(x,z){return terrainY(x,z)+1;}
function drawArrowPath(pts,col){
  const curve=new THREE.CatmullRomCurve3(pts);
  routeObj.add(new THREE.Mesh(new THREE.TubeGeometry(curve,160,0.42,8,false),new THREE.MeshStandardMaterial({color:col.t,emissive:col.e,emissiveIntensity:.3,roughness:.5})));
  for(let i=0;i<16;i++){const cone=new THREE.Mesh(new THREE.ConeGeometry(0.62,1.5,10),new THREE.MeshStandardMaterial({color:col.c,emissive:col.t,emissiveIntensity:.4}));cone.userData={t:i/16,curve};routeObj.add(cone);}
}

const NB=[[-42,35], [-40,38], [-35,41], [-28,44]];
function toV3(arr){return arr.map(p=>new THREE.Vector3(p[0],gy(p[0],p[1]),p[1]));}

function destForSide(B,sideDir){
  const rooms=B.rows[curFloor]||[];
  for(const c of rooms){ if(c.dir===sideDir&&c.dest)return c.dest; }
  return B.dest;
}
function descend(pts,stairWX,corrWZ,fMin){
  for(let ff=curFloor;ff>=fMin;ff--)pts.push(new THREE.Vector3(stairWX,baseY+(ff-fMin)*FLOOR_H+FLOOR_H*0.5,corrWZ));
  return pts;
}
function drawRoute(){
  clearRoute(); routeObj=new THREE.Group();
  const B=BUILDINGS[curKey];
  if(B.kind==='bar')routeBar(B); else if(B.kind==='L')routeKexue(B); else routeMass(B);
  scene.add(routeObj);
}
function routeBar(B){
  const corrZ=B.zPos-ROOM_D*0.5-1.2, exitZ=corrZ-2;
  const fY=baseY+(curFloor-B.fMin)*FLOOR_H+FLOOR_H*0.5;
  const xs=geom.stairXs.map(x=>x+B.xPos);
  const wStair=Math.max(...xs), eStair=Math.min(...xs);
  const wEnd=B.xPos+geom.bodyLen/2+6, eEnd=B.xPos-geom.bodyLen/2-6;
  function branch(stairWX,side){
    const sideDir = side==='single'?'S':(side==='west'?'W':'E');
    const dest = side==='single'?B.dest:destForSide(B,sideDir);
    let col = side==='west'?COLS.west: side==='east'?COLS.east:COLS.single;
    if(dest!==B.dest)col=COLS.southSp;
    
    let pts=[];
    descend(pts,stairWX,corrZ,B.fMin);
    pts.push(new THREE.Vector3(stairWX,gy(stairWX,exitZ),exitZ));
    
    let tail=[];
    const gndEndX = side==='west'?wEnd:eEnd;
    if(side==='single'){ tail=[[stairWX,exitZ-2],[16,-41],[plazaX,plazaZ]]; } 
    else{
      pts.push(new THREE.Vector3(gndEndX,gy(gndEndX,exitZ),exitZ));
      if(dest==='north'){ tail = [[gndEndX, 34], [-42, 34]].concat(NB); } 
      else { tail = side==='west' ? [[gndEndX,-37],[30,-40],[plazaX,plazaZ]] : [[gndEndX,-37],[-6,-40],[plazaX,plazaZ]]; }
    }
    toV3(tail).forEach(v=>pts.push(v));
    drawArrowPath(pts,col);

    // 繪製各樓層走廊兩端到樓梯的內部光流
    const wEdge = B.xPos + geom.bodyLen/2;
    const eEdge = B.xPos - geom.bodyLen/2;
    if (side === 'single') {
      drawArrowPath([new THREE.Vector3(wEdge, fY, corrZ), new THREE.Vector3(stairWX, fY, corrZ)], col);
      drawArrowPath([new THREE.Vector3(eEdge, fY, corrZ), new THREE.Vector3(stairWX, fY, corrZ)], col);
    } else {
      const midX = (wStair + eStair) / 2;
      const endX_floor = side === 'west' ? wEdge : eEdge;
      drawArrowPath([new THREE.Vector3(midX, fY, corrZ), new THREE.Vector3(stairWX, fY, corrZ)], col);
      drawArrowPath([new THREE.Vector3(endX_floor, fY, corrZ), new THREE.Vector3(stairWX, fY, corrZ)], col);
    }
  }
  if(xs.length>=2){branch(wStair,'west');branch(eStair,'east');} else branch(xs[0],'single');
}
function routeKexue(B){
  const fY=baseY+(curFloor-B.fMin)*FLOOR_H+FLOOR_H*0.5;
  const corrZ=B.zPos-ROOM_D*0.5-1.2;
  const corrX=B.xPos-(ROOM_D*0.5+1.2); 
  const wStair=B.xPos+geom.ewX(0), jStair=B.xPos+geom.ewX(6), nStairZ=B.zPos+geom.nsZ(0);
  const ewMid=B.xPos+geom.ewLen/2, nsMid=B.zPos+geom.nsLen/2;

  let p1=[new THREE.Vector3(ewMid,fY,corrZ),new THREE.Vector3(wStair,fY,corrZ)];
  descend(p1,wStair,corrZ,B.fMin); p1.push(new THREE.Vector3(wStair, gy(wStair,corrZ), corrZ)); p1.push(new THREE.Vector3(wStair, gy(wStair,20), 20)); p1.push(new THREE.Vector3(50, gy(50,20), 20)); drawArrowPath(p1,COLS.west);

  let p2=[new THREE.Vector3(ewMid,fY,corrZ),new THREE.Vector3(jStair,fY,corrZ)];
  descend(p2,jStair,corrZ,B.fMin); p2.push(new THREE.Vector3(jStair, gy(jStair,corrZ), corrZ)); p2.push(new THREE.Vector3(jStair, gy(jStair,20), 20)); p2.push(new THREE.Vector3(42, gy(42,20), 20)); drawArrowPath(p2,COLS.east);

  if(curFloor >= 3) {
    let pBridge = [new THREE.Vector3(corrX,fY,nsMid), new THREE.Vector3(corrX,fY,nStairZ)]; 
    pBridge.push(new THREE.Vector3(corrX, baseY+3*FLOOR_H+FLOOR_H*0.5, nStairZ)); 
    pBridge.push(new THREE.Vector3(29, baseY+3*FLOOR_H+FLOOR_H*0.5, nStairZ+2)); 
    pBridge.push(new THREE.Vector3(29, 49.8, 28)); 
    pBridge.push(new THREE.Vector3(29, 51.8, 50)); 
    pBridge.push(new THREE.Vector3(29, gy(29, 64), 64)); 
    drawArrowPath(pBridge,COLS.northSt);
    
    let pDown = [new THREE.Vector3(corrX,fY,nsMid), new THREE.Vector3(corrX,fY,nStairZ)]; for(let ff=curFloor;ff>=B.fMin;ff--) pDown.push(new THREE.Vector3(corrX, baseY+(ff-B.fMin)*FLOOR_H+FLOOR_H*0.5, nStairZ)); pDown.push(new THREE.Vector3(corrX, gy(corrX, nStairZ+2), nStairZ+2)); pDown.push(new THREE.Vector3(43, gy(43, 24), 24)); drawArrowPath(pDown,COLS.northSt);
  } else {
    let p3 = [new THREE.Vector3(corrX,fY,nsMid), new THREE.Vector3(corrX,fY,nStairZ)]; for(let ff=curFloor;ff>=B.fMin;ff--) p3.push(new THREE.Vector3(corrX, baseY+(ff-B.fMin)*FLOOR_H+FLOOR_H*0.5, nStairZ)); p3.push(new THREE.Vector3(corrX, gy(corrX, nStairZ+2), nStairZ+2)); p3.push(new THREE.Vector3(43, gy(43, 24), 24)); drawArrowPath(p3,COLS.northSt);
  }
}
function routeMass(B){
  if(curKey==='xingzheng'){
    const s=massShafts.xingzheng[0]; const yTop=s.topY-FLOOR_H*1.5;
    [[B.xPos+6],[B.xPos-6]].forEach(([sx])=>{
      const pts=[new THREE.Vector3(sx,yTop,s.wz),new THREE.Vector3(s.wx,yTop,s.wz), new THREE.Vector3(s.wx,gy(s.wx,B.zPos),s.wz), new THREE.Vector3(40,gy(40,-38),-38),new THREE.Vector3(36,gy(36,-41),-41),new THREE.Vector3(plazaX,gy(plazaX,plazaZ),plazaZ)];
      drawArrowPath(pts,COLS.single);
    });
  } else {
    massShafts.huodong.forEach(s=>{
      const pts=[new THREE.Vector3(s.wx,s.topY-1,s.wz),new THREE.Vector3(s.wx,gy(s.wx,B.zPos),s.wz), new THREE.Vector3(54,gy(54,s.wz),s.wz),new THREE.Vector3(54,gy(54,-40),-40),new THREE.Vector3(40,gy(40,plazaZ),plazaZ)];
      drawArrowPath(pts,COLS.single);
    });
  }
}

// 動畫迴圈更新
function animateDynamicObjects(time){ 
  if(routeObj){
    routeObj.children.forEach(o=>{ if(o.geometry?.type==='ConeGeometry'){const cv=o.userData.curve;let t=(o.userData.t+time*0.00009)%1;o.position.copy(cv.getPointAt(t));o.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),cv.getTangentAt(t).normalize());}}); 
  }
  if(cat){
    const speed = time * 0.00018; 
    const cx = 20; const cz = -45; const rx = 20; const rz = 8;
    cat.position.x = cx + Math.cos(speed) * rx;
    cat.position.z = cz + Math.sin(speed) * rz;
    cat.position.y = 24.51 + Math.abs(Math.sin(time * 0.005)) * 0.12;
    cat.lookAt(cx + Math.cos(speed + 0.1) * rx, cat.position.y, cz + Math.sin(speed + 0.1) * rz);
  }
  
  // 動態標示更新
  dynamicMarkers.forEach(m => {
    if (m.type === 'cross' || m.type === 'hammer' || m.type === 'comm') {
      m.mesh.rotation.y += 0.015;
    } else if (m.type === 'flag') {
      const pos = m.mesh.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = Math.sin(x * 2.5 - time * 0.005) * 0.15 * x;
        pos.setZ(i, z);
      }
      m.mesh.geometry.computeVertexNormals();
      pos.needsUpdate = true;
    }
  });
}

function buildLegend(){
  const B=BUILDINGS[curKey]; const el=document.getElementById('legend');
  if(B.kind==='mass'){ el.innerHTML='<span class="dot" style="background:var(--single)"></span>疏散路線 → 行政大樓前空地<br><span class="dot" style="background:var(--safe)"></span>樓梯豎井'; return; }
  if(B.kind==='L'){ el.innerHTML='<span class="dot" style="background:var(--west)"></span>西梯（東西翼西端）→ 合球場<br><span class="dot" style="background:var(--east)"></span>轉角梯（兩翼交會）→ 合球場<br><span class="dot" style="background:var(--north-stair)"></span>北梯（南北翼北端）→ 3F/4F 雙向分流至大操場與合球場<br><span class="dot" style="background:var(--safe)"></span>樓梯 · <span class="dot" style="background:#cbd5e1"></span>教室'; return; }
  const single=B.stairCols.length<2;
  if(single){ el.innerHTML='<span class="dot" style="background:var(--single)"></span>疏散路線（中央樓梯）<br><span class="dot" style="background:var(--safe)"></span>樓梯<br><span class="dot" style="background:#cbd5e1"></span>教室隔間'; } 
  else {
    let extra = curKey==='xinyi' ? '<br><span class="dot" style="background:var(--south-special)"></span>1F/2F 東側特例（東梯 → 往南）' : '';
    el.innerHTML='<span class="dot" style="background:var(--west)"></span>西側路線（左側樓梯）<br><span class="dot" style="background:var(--east)"></span>東側路線（右側樓梯）'+extra+'<br><span class="dot" style="background:var(--safe)"></span>樓梯 · <span class="dot" style="background:#cbd5e1"></span>教室';
  }
}

document.getElementById('buildingSel').onchange=function(){
  clearRoute();
  build(this.value);
  bridge.material.opacity = (this.value === 'kexue') ? 1.0 : 0.15;
};

const routeBtn=document.getElementById('routeBtn');
routeBtn.onclick=()=>{
  routeOn=!routeOn;
  routeBtn.textContent=routeOn?'隱藏疏散路線':'顯示疏散路線';
  routeBtn.classList.toggle('off',!routeOn); 
  routeOn?drawRoute():clearRoute();
};
document.getElementById('arrowChk').onchange=function(){showArrows=this.checked;applyArrowVis();};

/* ───────── 手勢與控制邏輯 ───────── */
const tip=document.getElementById('tip');
const DIRTXT={W:'往西側樓梯',E:'往東側樓梯',S:'往中央樓梯',N:'往北側樓梯'};
let drag=false, px=0, py=0, pinchDist=0;

function checkHit(clientX, clientY) {
  mouse.x=(clientX/innerWidth)*2-1; mouse.y=-(clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const vis=roomMeshes.filter(m=>m.userData.floor===curFloor);
  const hit=raycaster.intersectObjects(vis,false);
  roomMeshes.forEach(m=>{if(m.userData.baseMat)m.material=m.userData.baseMat;});
  if(hit.length){
    const m=hit[0].object; m.material=matRoomHi;
    const u=m.userData; const B=BUILDINGS[curKey]; const dest=u.dest||B.dest;
    const dt=u.dir?` → ${DIRTXT[u.dir]} → ${DEST_LABEL[dest]}`:'';
    tip.style.display='block';
    let tx = clientX + 12, ty = clientY + 12;
    if(tx + 200 > innerWidth) tx = clientX - 200; 
    tip.style.left=tx+'px'; tip.style.top=ty+'px';
    tip.textContent=`${u.floor===0?'B1':u.floor+'F'} · ${u.name}${dt}`;
  } else { tip.style.display='none'; }
}

renderer.domElement.addEventListener('pointerdown', e=>{
  drag=true; px=e.clientX; py=e.clientY; checkHit(e.clientX, e.clientY);
});
renderer.domElement.addEventListener('pointerup', ()=>drag=false);
renderer.domElement.addEventListener('pointermove', e=>{
  if(drag){
    azim-=(e.clientX-px)*0.006; polar-=(e.clientY-py)*0.006; 
    px=e.clientX; py=e.clientY; updateCam(); tip.style.display='none';
  } else {
    checkHit(e.clientX, e.clientY);
  }
});
renderer.domElement.addEventListener('wheel', e=>{ e.preventDefault(); dist*=(1+e.deltaY*0.001); updateCam(); },{passive:false});

renderer.domElement.addEventListener('touchstart', e=>{
  if(e.touches.length === 2){
    drag=false; 
    pinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
  }
}, {passive:false});
renderer.domElement.addEventListener('touchmove', e=>{
  if(e.touches.length === 2){
    e.preventDefault();
    const currDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    dist *= (1 + (pinchDist - currDist) * 0.005);
    pinchDist = currDist; updateCam();
  }
}, {passive:false});

// 預設進入行政大樓
build('xingzheng'); updateCam();
(function loop(t){requestAnimationFrame(loop);animateDynamicObjects(t);renderer.render(scene,camera);})(0);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
